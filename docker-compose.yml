services:
  db:
    image: postgres:16-alpine
    container_name: netshield-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-netshield_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netshield_pass}
      POSTGRES_DB: ${POSTGRES_DB:-netshield_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-netshield_user} -d $${POSTGRES_DB:-netshield_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: netshield-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-netshield_user}:${POSTGRES_PASSWORD:-netshield_pass}@db:5432/${POSTGRES_DB:-netshield_db}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HOST=0.0.0.0
      - PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: netshield-frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
